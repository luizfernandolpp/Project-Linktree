<!DOCTYPE html>
<html lang="pt-br" class="light">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>DevLinks</title>
</head>
<body>
    <div id="container">
        <div id="profile">
            <img src="./assets/Mobile/avatar.png" alt="Foto de perfil da personagem Frieren">
            <p>@frieren</p>
        </div>
        <div id="switch" onclick="toggleMode()">
            <button></button>
            <span></span>
        </div>

        <ul class="links">
            <li><a href="#">Torne-se um Mago de 1ª Classe</a></li>

            <li><a href="#">Veja meu portfólio</a></li>

        <div id="social">
            <a href="#">
                <ion-icon name="logo-github" class="icon"></ion-icon>
            </a>
            <a href="#">
                <ion-icon name="logo-instagram" class="icon"></ion-icon>
            </a>
            <a href="#">
                <ion-icon name="logo-youtube" class="icon"></ion-icon>
            </a>
            <a href="#">
                <ion-icon name="logo-linkedin" class="icon"></ion-icon>
            </a>

        </div>
        <footer>
            <p>Feito com ♥ pela <a href="https://app.rocketseat.com.br/" target="_blank">Rocketseat</a>. Versão de <a href="https://www.github.com/luizfernandolpp" target="_blank">Luiz Fernando</a></p>
        </footer>
    </div>
    <script src="https://unpkg.com/ionicons@4.5.10-0/dist/ionicons.js"></script>
    <script src="./script.js"></script>
</body>
</html>
